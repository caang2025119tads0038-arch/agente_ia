<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recomendador de Livros</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>
    <div class="container">
        <h1>Buscador de Livros</h1>
        <p>Digite um tema, autor, gênero ou título que você gosta:</p>
        
        <input type="hidden" id="session_id" value="">

        <div class="input-group">
            <input type="text" id="entrada" placeholder="Ex: Clarisse Lispector, ou 'A Hora da Estrela'" size="100">
            <button id="btn-recomendar">Buscar Recomendações</button>
        </div>

        <div id="resultado"></div>
    </div>

    <script>
        // Cria um ID de sessão temporário e único
        document.getElementById('session_id').value = 'sess_' + Date.now();
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
